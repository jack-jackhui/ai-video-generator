# Docker Build & Deploy Workflow
# Builds multi-arch Docker image on push to main, pushes to GHCR, and deploys to Azure VM

name: Docker Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".changeset/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jack-jackhui/ai_video_frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_MICROSOFT_REDIRECT_URL=${{ secrets.NEXT_PUBLIC_MICROSOFT_REDIRECT_URL }}
            NEXT_PUBLIC_MICROSOFT_CLIENT_ID=${{ secrets.NEXT_PUBLIC_MICROSOFT_CLIENT_ID }}
            NEXT_PUBLIC_GITHUB_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GITHUB_CLIENT_ID }}
            NEXT_PUBLIC_GITHUB_REDIRECT_URL=${{ secrets.NEXT_PUBLIC_GITHUB_REDIRECT_URL }}

      - name: Output image info
        run: |
          echo "Image pushed: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd ~/ai-video
            echo "Pulling latest frontend image..."
            docker compose pull frontend
            echo "Restarting frontend container..."
            docker compose up -d frontend
            echo "Cleaning up old images..."
            docker image prune -f
            echo "Deployment complete!"
            docker ps | grep ai_video_frontend

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            sleep 10
            if docker ps | grep -q ai_video_frontend; then
              echo "✅ Frontend container is running"
              docker logs ai_video_frontend --tail 20
            else
              echo "❌ Frontend container failed to start"
              docker logs ai_video_frontend --tail 50
              exit 1
            fi
