# CI Workflow - Next.js
# Runs on every PR and push to main

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: false

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Provide dummy env vars for build
          NEXT_PUBLIC_BACKEND_URL: https://example.com
          NEXT_PUBLIC_VIDEO_GEN_API_URL: https://example.com
